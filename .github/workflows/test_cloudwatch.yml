name: "CloudWatch Protocol Tests"
on:
  push:
    branches: # TODO: remove before merging to master
      - "cloudwatch-protocol-tests"
  pull_request:
    branches:
      - "master"
    paths:
      - ".github/workflows/test_cloudwatch.yml"
      - "moto/cloudwatch/**"
      - "tests/test_cloudwatch/**"
jobs:
  test-cloudwatch-protocols:
    runs-on: ubuntu-latest
    # TODO: use matrix when botocore releases the CloudWatch update.
    # strategy:
    # matrix:
    # botocore-version: ["major.minor.patch", "1.40.16"] # major.minor.patch uses JSON protocol, 1.40.16 uses QUERY protocol
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run Tests with Query Protocol
        run: |
          pip install botocore==1.40.16
          pytest -sv tests/test_cloudwatch
      - name: Run Tests with JSON Protocol
        run: |
          curl -L -o Boto3CliV1Artifacts.zip "https://d1l1rpjfz23h36.cloudfront.net/pr2qwos6sy8mfx2/Python_Boto_v3/Boto3CliV1Artifacts.zip"
          unzip Boto3CliV1Artifacts.zip
          pip install botocore-1.39.7-py3-none-any.whl
          pytest -sv tests/test_cloudwatch
